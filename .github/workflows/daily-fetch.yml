name: 🚢 船舶研究动态 - 每日采集

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🔍 执行论文采集
        run: |
          python scripts/fetch_papers.py
        timeout-minutes: 10

      - name: 📤 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: 🔧 启用 GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 通过 API 启用 Pages（使用 Actions 的内置 Token）
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"workflow"}' || echo "Pages 已启用"

      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: 🚢 船舶研究动态 - 每日采集

on:
  schedule:
    # 每天 UTC 00:00 = 北京时间 08:00（夏令时）或 08:00（冬令时）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🔍 执行论文采集
        run: |
          python scripts/fetch_papers.py
        timeout-minutes: 10

      - name: 📤 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

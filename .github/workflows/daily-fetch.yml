name: 🚢 船舶研究动态 - 每日采集

on:
  schedule:
    # 每3天一次，北京时间 08:00 = UTC 00:00
    - cron: '0 0 */3 * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🔍 执行论文采集
        run: |
          python scripts/fetch_papers.py
        timeout-minutes: 10

      - name: 🚀 推送到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true

      - name: 🔧 配置 GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 检查 Pages 状态..."
          gh api repos/${{ github.repository }}/pages --jq '.status' 2>/dev/null || echo "Pages 未启用"
          
          echo "🔄 创建/更新 Pages 配置..."
          gh api \
            --method POST \
            repos/${{ github.repository }}/pages \
            -f source[branch]=gh-pages \
            -f source[path]="/" \
            2>/dev/null || \
          gh api \
            --method PUT \
            repos/${{ github.repository }}/pages \
            -f source[branch]=gh-pages \
            -f source[path]="/" \
            2>/dev/null || \
          echo "⚠️ API 配置失败，可能需要手动设置"
          
          echo "🔄 验证 Pages..."
          gh api repos/${{ github.repository }}/pages --jq '{status, html_url}' 2>/dev/null
